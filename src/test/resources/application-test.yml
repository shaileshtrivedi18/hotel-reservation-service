spring:
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    consumer:
      group-id: room-reservation-test-group
      auto-offset-reset: earliest

credit-card-payment-service:
  base-url: http://localhost:9999/host/credit-card-payment-api
  timeout-seconds: 5

reservation:
  auto-cancel:
    cron: "0 0 2 * * *"
